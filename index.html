<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守破離 SHU HA RI 2026</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="images/124662.jpg" type="image/jpeg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-black flex justify-between items-center px-6 py-4 z-[100]">
        <a href="#hero" class="font-black text-xl tracking-tighter italic">守破離 SHU HA RI 2026</a>
        <nav class="hidden lg:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
            <a href="#hero" class="nav-label" data-key="nav.hero">Home</a>
            <a href="#vision" class="nav-label" data-key="nav.vision">Vision</a>
            <a href="#concept" class="nav-label" data-key="nav.concept">Concept</a>
            <a href="#artists" class="nav-label" data-key="nav.artists">Artists</a>
            <a href="#schedule" class="nav-label" data-key="nav.schedule">Schedule</a>
            <a href="#access" class="nav-label" data-key="nav.access">Access</a>
        </nav>

        <div id="header-social" class="flex gap-4 text-lg"></div>

        <div class="flex items-center gap-4 text-[10px] font-bold">
            <button onclick="setLang('en')">EN</button> / 
            <button onclick="setLang('de')">DE</button> / 
            <button onclick="setLang('ja')">JP</button>
            <button onclick="toggleMenu()" class="lg:hidden p-2 text-lg">≡</button>
        </div>
    </header>

    <div class="fixed-bg-container">
        <img id="h-img" src="" class="fixed-bg-image">
        <div class="fixed-bg-mask"></div>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>
    <div id="mobile-menu" class="p-10 flex flex-col gap-8 shadow-2xl">
        <button onclick="toggleMenu()" class="self-end text-2xl">✕</button>
        <nav class="flex flex-col gap-6 text-sm font-bold uppercase tracking-widest">
            <a href="#hero" onclick="toggleMenu()">Home</a>
            <a href="#vision" onclick="toggleMenu()">Vision</a>
            <a href="#concept" onclick="toggleMenu()">Konzept</a>
            <a href="#artists" onclick="toggleMenu()">Artists</a>
            <a href="#schedule" onclick="toggleMenu()">Schedule</a>
            <a href="#access" onclick="toggleMenu()">Access</a>
        <div id="header-social" class="flex gap-4 text-lg"></div>
    </div>

    <main>
        <section id="hero" class="min-h-screen flex flex-col justify-center px-6 relative text-white text-center">
            <div class="max-w-[1400px] mx-auto flex flex-col items-center">
                <h1 class="text-6xl md:text-[7rem] font-black tracking-tighter leading-none mb-4">守破離 SHU HA RI 2026</h1>
                
                <div class="space-y-2 mb-12 text-sm md:text-base font-bold tracking-widest">
                    <p id="h-date"></p>
                    <p id="h-entry"></p>
                    <p id="h-venue" class="max-w-md"></p>
                </div>

                <a href="#" id="h-btn" target="_blank" class="px-10 py-4 border-2 border-white font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-300">
                    Register Now
                </a>
            </div>
        </section>

        <section id="vision" class="grid-line-b bg-white relative z-10">
            <div class="max-w-[1000px] mx-auto py-20 px-8">
                <p class="text-[#3F51B5] font-bold tracking-[0.4em] mb-10 text-xs uppercase text-center">Vision</p>
                
                <h2 id="v-main" class="responsive-title text-black font-black italic tracking-tighter leading-[1.1] text-center mb-16"></h2>
                
                <div id="v-sub" class="max-w-[800px] mx-auto text-lg leading-relaxed text-black font-medium whitespace-pre-wrap"></div>
            </div>
        </section>

        <section id="concept" class="grid-line-b bg-white relative z-10">
            <div class="max-w-[1000px] mx-auto py-20 px-8">
                <p class="text-[#D32F2F] font-bold tracking-[0.4em] mb-10 text-xs uppercase text-center">Concept</p>
                
                <h2 id="c-title" class="responsive-title text-black font-black italic tracking-tighter leading-[1.1] text-center mb-16"></h2>
                
                <div id="c-body" class="max-w-[800px] mx-auto text-lg leading-relaxed text-black font-medium"></div>
            </div>
        </section>

        <section id="artists" class="grid-line-b bg-white relative z-10">
            <div id="artists-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4"></div>
        </section>

        <section id="info" class="bg-white relative z-10 grid grid-cols-1 md:grid-cols-2">
            <div id="schedule" class="p-8 md:p-20 md:grid-line-r grid-line-b">
                <h2 class="text-[#3F51B5] font-bold tracking-[0.4em] mb-10 text-xs">SCHEDULE</h2>
                <div id="schedule-list" class="space-y-2"></div>
            </div>
            <div id="access" class="p-8 md:p-20 grid-line-b">
                <h2 class="text-[#4CAF50] font-bold tracking-[0.4em] mb-10 text-xs">ACCESS</h2>
                <div id="access-info" class="space-y-4"></div>
            </div>
        </section>

        <section id="partners" class="bg-white relative z-10 border-t border-black">
            <div class="grid grid-cols-1 md:grid-cols-2">
                <div class="p-8 md:p-20">
                    <h2 class="text-[#4CAF50] font-bold tracking-[0.4em] mb-12 text-xs uppercase">Support</h2>
                    <div id="support-list" class="grid grid-cols-2 gap-8 items-center">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="p-12 text-center bg-white border-t border-black relative z-10">
        <div id="footer-social" class="flex gap-6 mb-8 text-2xl"></div>
        <p class="text-[10px] font-bold tracking-widest opacity-30 uppercase">© 守破離 SHU HA RI 2026</p>
    </footer>

    <script src="./js/locales/en.js"></script>
    <script src="./js/locales/de.js"></script>
    <script src="./js/locales/ja.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
